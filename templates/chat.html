<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBuddy</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">
            <div class="col-md-8 col-xl-6 chat">
                <div class="card">
                    <div class="card-header msg_head">
                        <div class="d-flex bd-highlight align-items-center">
                            <div class="img_cont">
                                <img src="{{ url_for('static', filename='chatbot-avatar.jpg') }}" class="rounded-circle user_img" alt="FitBuddy avatar">
                                <span class="online_icon"></span>
                            </div>
                            <div class="user_info">
                                <span>FitBuddy</span>
                                <p>Your AI fitness and nutrition assistant</p>
                            </div>
                        </div>
                    </div>
                    <div id="messageFormeight" class="card-body msg_card_body"></div>
                    <div class="card-footer">
                        <form id="messageArea" class="composer" enctype="multipart/form-data">
                            <input type="file" id="imageInput" name="image" accept="image/*" capture="environment" hidden>
                            <textarea id="text" name="msg" placeholder="Ask about workouts, BMI, diet charts, Indian meals, or upload a food image..." autocomplete="off" class="form-control type_msg" rows="2"></textarea>
                            <div class="composer_actions">
                                <div class="control_group">
                                    <label for="imageInput" class="control_btn upload_inline_btn" title="Upload or capture a food image">
                                        <i class="fas fa-plus"></i>
                                    </label>
                                    <button type="button" id="micButton" class="control_btn" title="Start voice input">
                                        <i class="fas fa-microphone"></i>
                                    </button>
                                    <button type="button" id="speakToggle" class="control_btn active_voice" title="Toggle voice replies">
                                        <i class="fas fa-volume-up"></i>
                                    </button>
                                </div>
                                <button type="submit" id="send" class="send_btn" title="Send message">
                                    <i class="fas fa-arrow-up"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = SpeechRecognition ? new SpeechRecognition() : null;
            const speechSynthesisSupported = "speechSynthesis" in window;
            let speakResponses = true;
            let isListening = false;
            let shouldKeepListening = false;
            let finalTranscript = "";
            let selectedImage = null;

            function getTimeStamp() {
                const date = new Date();
                return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
            }

            function escapeHtml(text) {
                return $("<div>").text(text).html();
            }

            function linkifyText(text) {
                const escaped = escapeHtml(text);
                return escaped.replace(
                    /(https?:\/\/[^\s<]+)/g,
                    '<a href="$1" target="_blank" rel="noopener noreferrer" class="chat_link">$1</a>'
                );
            }

            function appendUserMessage(text) {
                const safeText = escapeHtml(text);
                const userHtml = `
                    <div class="d-flex justify-content-end mb-4">
                        <div class="msg_cotainer_send">${safeText}<span class="msg_time_send">${getTimeStamp()}</span></div>
                        <div class="img_cont_msg">
                            <img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg" alt="User avatar">
                        </div>
                    </div>`;
                $("#messageFormeight").append(userHtml);
                $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
            }

            function appendBotMessage(text) {
                const safeText = linkifyText(text).replace(/\n/g, "<br>");
                const botHtml = `
                    <div class="d-flex justify-content-start mb-4">
                        <div class="img_cont_msg">
                            <img src="{{ url_for('static', filename='chatbot-avatar.jpg') }}" class="rounded-circle user_img_msg" alt="Bot avatar">
                        </div>
                        <div class="msg_cotainer">${safeText}<span class="msg_time">${getTimeStamp()}</span></div>
                    </div>`;
                $("#messageFormeight").append(botHtml);
                $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);

                if (speakResponses && speechSynthesisSupported) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = "en-IN";
                    utterance.rate = 1;
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utterance);
                }
            }

            function sendMessage(rawText) {
                if (!rawText.trim() && !selectedImage) {
                    return;
                }

                const messageText = rawText.trim() || "Please analyze this food image and share the nutrition estimate.";
                appendUserMessage(messageText + (selectedImage ? " [Image attached]" : ""));
                $("#text").val("");
                const formData = new FormData();
                formData.append("msg", rawText);
                if (selectedImage) {
                    formData.append("image", selectedImage);
                }

                $.ajax({
                    data: formData,
                    type: "POST",
                    url: "/get",
                    processData: false,
                    contentType: false,
                }).done(function(data) {
                    appendBotMessage(data.answer);
                    selectedImage = null;
                    $("#imageInput").val("");
                }).fail(function(response) {
                    const fallbackMessage = response.responseJSON && response.responseJSON.message
                        ? response.responseJSON.message
                        : "Sorry, I could not process that request right now.";
                    appendBotMessage(fallbackMessage);
                });
            }

            $("#messageArea").on("submit", function(event) {
                event.preventDefault();
                sendMessage($("#text").val());
            });

            $("#imageInput").on("change", function(event) {
                const file = event.target.files[0];
                selectedImage = file || null;
            });

            if (!recognition) {
                $("#micButton").prop("disabled", true);
            } else {
                recognition.lang = "hi-IN";
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;

                recognition.onstart = function() {
                    isListening = true;
                    $("#micButton").addClass("listening");
                };

                recognition.onend = function() {
                    isListening = false;
                    $("#micButton").removeClass("listening");
                    if (shouldKeepListening) {
                        recognition.start();
                        return;
                    }
                };

                recognition.onresult = function(event) {
                    let interimTranscript = "";

                    for (let i = event.resultIndex; i < event.results.length; i += 1) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript + " ";
                        } else {
                            interimTranscript += transcript;
                        }
                    }

                    const combinedTranscript = (finalTranscript + interimTranscript).trim();
                    $("#text").val(combinedTranscript);
                };

                recognition.onerror = function(event) {
                    shouldKeepListening = false;
                };

                $("#micButton").on("click", function() {
                    if (speechSynthesisSupported) {
                        window.speechSynthesis.cancel();
                    }

                    if (isListening) {
                        shouldKeepListening = false;
                        recognition.stop();
                        const transcriptToSend = finalTranscript.trim() || $("#text").val().trim();
                        finalTranscript = "";
                        if (transcriptToSend) {
                            sendMessage(transcriptToSend);
                        }
                    } else {
                        finalTranscript = "";
                        $("#text").val("");
                        shouldKeepListening = true;
                        recognition.start();
                    }
                });
            }

            if (!speechSynthesisSupported) {
                speakResponses = false;
                $("#speakToggle").prop("disabled", true).removeClass("active_voice");
            }

            $("#speakToggle").on("click", function() {
                speakResponses = !speakResponses;
                $(this).toggleClass("active_voice", speakResponses);
                if (!speakResponses && speechSynthesisSupported) {
                    window.speechSynthesis.cancel();
                }
            });

            appendBotMessage("Welcome to FitBuddy. I can help with personalized fitness guidance, workout planning, diet strategies, BMI support, and food nutrition estimates.");
        });
    </script>
</body>
</html>
